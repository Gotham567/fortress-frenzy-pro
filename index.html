    <!-- FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que la directive NIS2 et quelles entreprises sont concernées ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La directive européenne NIS2 élargit les obligations de cybersécurité aux PME et ETI de 18 secteurs critiques à partir de 50 employés ou 10 millions d'euros de CA. CyberConform vous aide à déterminer si votre PME est concernée par NIS2."
          }
        },
        {
          "@type": "Question",
          "name": "Comment se mettre en conformité NIS2 quand on est une PME ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La mise en conformité NIS2 pour une PME passe par un diagnostic d'éligibilité, une analyse d'écart, la mise en place de mesures de sécurité et la formation des équipes. Notre pack conformité NIS2 dédié aux PME permet de réaliser cette mise en conformité en 3 à 6 mois."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la différence entre conformité NIS2 et conformité RGPD ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le RGPD concerne la protection des données personnelles, tandis que NIS2 porte sur la sécurité des réseaux et systèmes d'information. Les deux sont complémentaires. CyberConform accompagne les entreprises sur les deux volets."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles sont les sanctions en cas de non-conformité NIS2 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les sanctions NIS2 peuvent atteindre 10 millions d'euros ou 2% du CA mondial pour les entités essentielles. La responsabilité personnelle des dirigeants peut être engagée."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte une mise en conformité RGPD pour une PME ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pour une PME, comptez entre 5 000 et 20 000 € pour un accompagnement complet en mise en conformité RGPD. Contactez CyberConform pour un diagnostic RGPD gratuit."
          }
        }
      ]
    }
